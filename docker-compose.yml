services:
  db:
    image: postgres:16-alpine
    container_name: fairy-crocheter-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fairycrocheter}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fairycrocheter}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: thefairycrocheter:latest
    container_name: fairy-crocheter-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      AUTO_SEED: ${AUTO_SEED:-true}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-fairycrocheter}?schema=public
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3001}:3000"
    volumes:
      - app-documents:/app/documents
      - app-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db-data:
  app-documents:
  app-logs:
